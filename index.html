<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Áreas Silvestres Protegidas del Área de Conservación Central</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/reaConservacinCentral_1.js"></script>
        <script src="data/reasSilvestresProtegidasReginCentral_2.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[8.607816674850884,-85.28724741233668],[11.241109556452358,-81.3303098566706]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topright'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>Áreas Silvestres Protegidas del Área de Conservación Central</h2>';
        };
        title.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        function pop_reaConservacinCentral_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['nombre_ac'] !== null ? autolinker.link(String(feature.properties['nombre_ac']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_reaConservacinCentral_1_0() {
            return {
                pane: 'pane_reaConservacinCentral_1',
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 4.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_reaConservacinCentral_1');
        map.getPane('pane_reaConservacinCentral_1').style.zIndex = 401;
        map.getPane('pane_reaConservacinCentral_1').style['mix-blend-mode'] = 'normal';
        var layer_reaConservacinCentral_1 = new L.geoJson(json_reaConservacinCentral_1, {
            attribution: '',
            interactive: false,
            dataVar: 'json_reaConservacinCentral_1',
            layerName: 'layer_reaConservacinCentral_1',
            pane: 'pane_reaConservacinCentral_1',
            onEachFeature: pop_reaConservacinCentral_1,
            style: style_reaConservacinCentral_1_0,
        });
        bounds_group.addLayer(layer_reaConservacinCentral_1);
        map.addLayer(layer_reaConservacinCentral_1);
        function pop_reasSilvestresProtegidasReginCentral_2(feature, layer) {
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_reasSilvestresProtegidasReginCentral_2_0(feature) {
            switch(String(feature.properties['cat_manejo'])) {
                case 'Monumento Nacional':
                    return {
                pane: 'pane_reasSilvestresProtegidasReginCentral_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(27,225,133,1.0)',
                interactive: false,
            }
                    break;
                case 'Monumento Natural':
                    return {
                pane: 'pane_reasSilvestresProtegidasReginCentral_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(216,100,54,1.0)',
                interactive: false,
            }
                    break;
                case 'Parque Nacional':
                    return {
                pane: 'pane_reasSilvestresProtegidasReginCentral_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(182,84,209,1.0)',
                interactive: false,
            }
                    break;
                case 'Refugio Nacional de Vida Silvestre':
                    return {
                pane: 'pane_reasSilvestresProtegidasReginCentral_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(118,116,222,1.0)',
                interactive: false,
            }
                    break;
                case 'Reserva Biologica':
                    return {
                pane: 'pane_reasSilvestresProtegidasReginCentral_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(17,159,211,1.0)',
                interactive: false,
            }
                    break;
                case 'Reserva Forestal':
                    return {
                pane: 'pane_reasSilvestresProtegidasReginCentral_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(79,206,44,1.0)',
                interactive: false,
            }
                    break;
                case 'Zona Protectora':
                    return {
                pane: 'pane_reasSilvestresProtegidasReginCentral_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(220,19,113,1.0)',
                interactive: false,
            }
                    break;
            }
        }
        map.createPane('pane_reasSilvestresProtegidasReginCentral_2');
        map.getPane('pane_reasSilvestresProtegidasReginCentral_2').style.zIndex = 402;
        map.getPane('pane_reasSilvestresProtegidasReginCentral_2').style['mix-blend-mode'] = 'normal';
        var layer_reasSilvestresProtegidasReginCentral_2 = new L.geoJson(json_reasSilvestresProtegidasReginCentral_2, {
            attribution: '',
            interactive: false,
            dataVar: 'json_reasSilvestresProtegidasReginCentral_2',
            layerName: 'layer_reasSilvestresProtegidasReginCentral_2',
            pane: 'pane_reasSilvestresProtegidasReginCentral_2',
            onEachFeature: pop_reasSilvestresProtegidasReginCentral_2,
            style: style_reasSilvestresProtegidasReginCentral_2_0,
        });
        bounds_group.addLayer(layer_reasSilvestresProtegidasReginCentral_2);
        map.addLayer(layer_reasSilvestresProtegidasReginCentral_2);
        var overlaysTree = [
            {label: 'Áreas Silvestres Protegidas Región Central<br /><table><tr><td style="text-align: center;"><img src="legend/reasSilvestresProtegidasReginCentral_2_MonumentoNacional0.png" /></td><td>Monumento Nacional</td></tr><tr><td style="text-align: center;"><img src="legend/reasSilvestresProtegidasReginCentral_2_MonumentoNatural1.png" /></td><td>Monumento Natural</td></tr><tr><td style="text-align: center;"><img src="legend/reasSilvestresProtegidasReginCentral_2_ParqueNacional2.png" /></td><td>Parque Nacional</td></tr><tr><td style="text-align: center;"><img src="legend/reasSilvestresProtegidasReginCentral_2_RefugioNacionaldeVidaSilvestre3.png" /></td><td>Refugio Nacional de Vida Silvestre</td></tr><tr><td style="text-align: center;"><img src="legend/reasSilvestresProtegidasReginCentral_2_ReservaBiologica4.png" /></td><td>Reserva Biologica</td></tr><tr><td style="text-align: center;"><img src="legend/reasSilvestresProtegidasReginCentral_2_ReservaForestal5.png" /></td><td>Reserva Forestal</td></tr><tr><td style="text-align: center;"><img src="legend/reasSilvestresProtegidasReginCentral_2_ZonaProtectora6.png" /></td><td>Zona Protectora</td></tr></table>', layer: layer_reasSilvestresProtegidasReginCentral_2},
            {label: '<img src="legend/reaConservacinCentral_1.png" /> Área Conservación Central', layer: layer_reaConservacinCentral_1},
            {label: "OpenStreetMap", layer: layer_OpenStreetMap_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>        
    </body>
</html>
